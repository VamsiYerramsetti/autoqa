version: "3.9"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoqa-backend
    environment:
      PORT: 4000
      NODE_ENV: production
      FRONTEND_ORIGIN: http://localhost:3000
      FRONTEND_APP_URL: http://localhost:3000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_TARGET: http://backend:4000
    container_name: autoqa-frontend
    environment:
      INTERNAL_API_TARGET: http://backend:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
